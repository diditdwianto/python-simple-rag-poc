<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG POC</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242734;
      --border: #2e3144;
      --text: #e4e6f0;
      --text-muted: #8b8fa3;
      --primary: #6c8cff;
      --primary-hover: #8da6ff;
      --success: #4ade80;
      --error: #f87171;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header h1 span { color: var(--primary); }
    .header-actions { display: flex; gap: 8px; }
    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    .status-bar {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .status-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.ok { background: var(--success); }
    .dot.err { background: var(--error); }
    .dot.loading { background: #facc15; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 8px 4px 20px 4px;
      min-height: 300px;
    }

    .message {
      padding: 16px 20px;
      border-radius: var(--radius);
      line-height: 1.6;
      max-width: 100%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg-question {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 20px 28px;
      font-size: 1rem;
      line-height: 1.7;
    }
    .msg-question .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .msg-answer {
      background: var(--surface);
      border: 1px solid rgba(108,140,255,0.2);
      padding: 20px 28px;
      font-size: 1rem;
      line-height: 1.8;
    }
    .msg-answer .answer-body p { margin: 0 0 0.6em; }
    .msg-answer .answer-body ol, .msg-answer .answer-body ul { margin: 0 0 0.6em; padding-left: 1.5em; }
    .msg-answer .answer-body li { margin-bottom: 0.3em; }
    .msg-answer .answer-body code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; }
    .msg-answer .answer-body pre { background: var(--surface2); padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 0 0 0.6em; }
    .msg-answer .answer-body pre code { background: none; padding: 0; }
    .msg-answer .answer-body strong { color: var(--text); }
    .msg-answer .answer-body h1, .msg-answer .answer-body h2, .msg-answer .answer-body h3 { margin: 0.8em 0 0.3em; color: var(--text); }
    .msg-answer .answer-body blockquote { border-left: 3px solid var(--primary); padding-left: 12px; margin: 0 0 0.6em; color: var(--text-muted); }
    .msg-answer .label {
      font-size: 0.7rem;
      color: var(--success);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .msg-error {
      background: #2d1518;
      border: 1px solid var(--error);
      border-left: 3px solid var(--error);
      padding: 20px 28px;
      font-size: 1rem;
      line-height: 1.7;
    }
    .msg-error .label {
      font-size: 0.7rem;
      color: var(--error);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .sources .tag {
      display: inline-block;
      padding: 2px 10px;
      margin: 2px 4px 2px 0;
      font-size: 0.75rem;
      background: var(--surface2);
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--primary);
    }

    .context-toggle {
      margin-top: 8px;
    }
    .context-toggle summary {
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .context-toggle summary:hover { color: var(--text); }
    .context-chunks {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .context-chunk {
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .context-chunk .chunk-meta {
      font-size: 0.7rem;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .input-area {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 24px 0 0 0;
      border-top: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-area textarea {
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 56px;
      max-height: 200px;
      font-family: inherit;
    }
    .input-area textarea:focus {
      border-color: var(--primary);
    }
    .source-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .source-row input {
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      flex: 1;
    }
    .source-row input:focus {
      border-color: var(--primary);
    }
    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }
    .empty-state h2 {
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 0.9rem; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 20px 28px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Pipeline activity: per-phase timing breakdown, shown in a collapsible
       block at the bottom of an answer */
    .activity {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 8px;
      font-size: 0.82rem;
    }
    .activity-step {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 4px 0;
    }
    .activity-step .icon {
      width: 16px;
      flex: 0 0 16px;
      text-align: center;
      color: var(--success);
    }
    .activity-step .step-label { color: var(--text); flex: 1; }
    .activity-step .step-time {
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .activity-step .step-time .detail { color: var(--primary); }
    .activity-substep {
      margin: 2px 0 4px 26px;
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .activity-substep .bolt { color: #facc15; }
    .activity-total {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Python-Redis</span> RAG POC</h1>
    <div class="header-actions">
      <a class="btn" href="/data">All Data</a>
      <button class="btn" id="btn-status" onclick="checkStatus()">Check Status</button>
      <input type="file" id="file-input" accept=".md,.txt" hidden />
      <button class="btn" id="btn-upload" onclick="document.getElementById('file-input').click()">Upload Doc</button>
      <button class="btn" id="btn-ingest" onclick="runIngest()">Re-ingest Docs</button>
    </div>
  </header>

  <main>
    <div class="status-bar" id="status-bar">
      <span><strong>System Status</strong></span>
      <span><span class="dot loading" id="status-dot"></span><span id="status-text">Checking index&hellip;</span></span>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="empty-state" id="empty-state">
        <div>
          <h2>Ask a question</h2>
          <p>Query your documents using RAG. Type a question below and press Enter or click Ask.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="question-input" placeholder="Type your question..." rows="2" autofocus></textarea>
      <div class="source-row">
        <span class="hint">Optional: filter by source filename</span>
        <input type="text" id="source-input" placeholder="e.g. coffee-brewing-guide.md" />
      </div>
      <button class="btn btn-primary" id="btn-ask" onclick="askQuestion()">Ask</button>
    </div>
  </main>

  <script>
    const chatArea = document.getElementById('chat-area');
    const emptyState = document.getElementById('empty-state');
    const questionInput = document.getElementById('question-input');
    const sourceInput = document.getElementById('source-input');
    const btnAsk = document.getElementById('btn-ask');
    const btnIngest = document.getElementById('btn-ingest');
    const btnUpload = document.getElementById('btn-upload');
    const fileInput = document.getElementById('file-input');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) uploadDoc(file);
      fileInput.value = '';  // allow re-selecting the same file
    });

    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
      }
    });

    function hideEmpty() {
      if (emptyState) emptyState.remove();
    }

    function addMessage(type, html) {
      hideEmpty();
      const div = document.createElement('div');
      div.className = 'msg-' + type;
      div.innerHTML = html;
      chatArea.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return div;
    }

    function fmtTime(ms) {
      if (ms == null) return '';
      if (ms < 1000) return Math.round(ms) + ' ms';
      return (ms / 1000).toFixed(2) + ' s';
    }

    function fmtRate(toks, secs) {
      if (!toks || !secs) return '';
      return (toks / secs).toFixed(1) + ' tok/s';
    }

    function showTyping() {
      hideEmpty();
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing';
      div.innerHTML = '<span class="spinner"></span> Thinking&hellip;';
      chatArea.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // Render the pipeline timing breakdown as a collapsible block, shown at the
    // bottom of an answer (after "Show retrieved context" / "Show LLM prompt").
    function renderActivity(act) {
      if (!act || !act.steps || !act.steps.length) return '';
      let rows = '';
      for (const s of act.steps) {
        let time = fmtTime(s.ms);
        const l = s.llm;
        if (l && l.completion_tokens) {
          time += ' &middot; ' + l.completion_tokens + ' tok';
          if (l.completion_time) time += ' @ ' + fmtRate(l.completion_tokens, l.completion_time);
        } else if (s.detail) {
          time += ' &middot; <span class="detail">' + escapeHtml(s.detail) + '</span>';
        }
        rows += '<div class="activity-step"><span class="icon">&#10003;</span>'
          + '<span class="step-label">' + escapeHtml(s.label) + '</span>'
          + '<span class="step-time">' + time + '</span></div>';
        if (l) {
          const bits = [];
          if (l.first_token != null) bits.push('first token ' + fmtTime(l.first_token * 1000));
          if (l.queue_time) bits.push('queued ' + fmtTime(l.queue_time * 1000));
          if (l.prompt_tokens) {
            let p = 'prompt ' + l.prompt_tokens + ' tok';
            if (l.prompt_time) p += ' in ' + fmtTime(l.prompt_time * 1000);
            bits.push(p);
          }
          if (l.completion_tokens) {
            let g = 'generated ' + l.completion_tokens + ' tok';
            if (l.completion_time) g += ' in ' + fmtTime(l.completion_time * 1000) + ' (' + fmtRate(l.completion_tokens, l.completion_time) + ')';
            bits.push(g);
          }
          if (bits.length) {
            rows += '<div class="activity-substep"><span class="bolt">&#9889;</span> ' + bits.join(' &middot; ') + '</div>';
          }
        }
      }
      let html = '<details class="context-toggle"><summary>Show pipeline activity</summary>';
      html += '<div class="activity"><div class="activity-steps">' + rows + '</div>';
      if (act.total_ms != null) html += '<div class="activity-total">Total: ' + fmtTime(act.total_ms) + '</div>';
      html += '</div></details>';
      return html;
    }

    async function askQuestion() {
      const question = questionInput.value.trim();
      if (!question) return;

      questionInput.value = '';
      addMessage('question', '<div class="label">You</div>' + escapeHtml(question));

      btnAsk.disabled = true;
      showTyping();

      try {
        const resp = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, source: sourceInput.value.trim() || null }),
        });
        const data = await resp.json();
        removeTyping();

        if (data.error) {
          addMessage('error', '<div class="label">Error</div>' + escapeHtml(data.error));
        } else {
          let html = '<div class="label">Answer</div><div class="answer-body">' + marked.parse(data.answer) + '</div>';
          if (data.sources && data.sources.length) {
            html += '<div class="sources">Sources: ' + data.sources.map(s => '<span class="tag">' + escapeHtml(s) + '</span>').join('') + '</div>';
          }
          if (data.context && data.context.length) {
            html += '<details class="context-toggle"><summary>Show retrieved context (' + data.context.length + ' chunks)</summary>';
            html += '<div class="context-chunks">';
            for (const c of data.context) {
              html += '<div class="context-chunk"><div class="chunk-meta">' + escapeHtml(c.source) + ' &middot; chunk #' + c.chunk_index + ' &middot; ' + (c.search_mode === 'hybrid' ? 'score: ' + c.distance : 'distance: ' + c.distance) + '</div>' + escapeHtml(c.content) + '</div>';
            }
            html += '</div></details>';
          }
          if (data.prompt) {
            html += '<details class="context-toggle"><summary>Show LLM prompt</summary>';
            html += '<div class="context-chunks">';
            html += '<div class="context-chunk"><div class="chunk-meta">System prompt</div>' + escapeHtml(data.prompt.system) + '</div>';
            html += '<div class="context-chunk"><div class="chunk-meta">User prompt</div>' + escapeHtml(data.prompt.user) + '</div>';
            html += '</div></details>';
          }
          html += renderActivity(data.activity);
          addMessage('answer', html);
        }
      } catch (err) {
        removeTyping();
        addMessage('error', '<div class="label">Error</div>' + escapeHtml(err.message));
      }

      btnAsk.disabled = false;
      questionInput.focus();
    }

    async function checkStatus() {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'dot loading';
      text.textContent = 'Checking index\u2026';
      try {
        const resp = await fetch('/api/status');
        const data = await resp.json();
        if (data.error) {
          dot.className = 'dot err';
          text.textContent = 'Error: ' + data.error;
        } else {
          dot.className = 'dot ok';
          text.textContent = 'Index "' + data.index_name + '" \u2014 ' + data.num_chunks + ' chunks, ' + data.num_index_records + ' indexed terms';
        }
      } catch (err) {
        dot.className = 'dot err';
        text.textContent = 'Connection error: ' + err.message;
      }
    }

    async function runIngest() {
      btnIngest.disabled = true;
      btnIngest.textContent = 'Ingesting\u2026';
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'dot loading';
      text.textContent = 'Re-indexing documents\u2026';
      try {
        const resp = await fetch('/api/ingest', { method: 'POST' });
        const data = await resp.json();
        if (data.error) {
          addMessage('error', '<div class="label">Ingest Error</div>' + escapeHtml(data.error));
        } else {
          addMessage('answer', '<div class="label">Ingest</div>' + escapeHtml(data.message));
        }
      } catch (err) {
        addMessage('error', '<div class="label">Error</div>' + escapeHtml(err.message));
      }
      btnIngest.disabled = false;
      btnIngest.textContent = 'Re-ingest Docs';
      checkStatus();
    }

    // Upload a .md/.txt file to data/. After it's saved, offer to ingest it.
    async function uploadDoc(file) {
      btnUpload.disabled = true;
      btnUpload.textContent = 'Uploading…';
      try {
        const fd = new FormData();
        fd.append('file', file);
        const resp = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        if (data.error) {
          addMessage('error', '<div class="label">Upload Error</div>' + escapeHtml(data.error));
        } else {
          const name = data.filename;
          let note = data.replaced ? ' (replaced an existing file of the same name)' : '';
          if (data.renamed_from) {
            note += ' — renamed from <strong>' + escapeHtml(data.renamed_from)
              + '</strong>, dropping the <code>exclude-</code> prefix so it can be ingested';
          }
          const html = '<div class="label">Upload</div>'
            + 'Saved <strong>' + escapeHtml(name) + '</strong> to <code>data/</code>' + note + '. '
            + 'It will be ingested on the next full re-ingest, or ingest just this file now:'
            + '<div style="margin-top:12px;">'
            + '<button class="btn btn-primary" onclick="ingestFile(this, \'' + encodeURIComponent(name) + '\')">Ingest this file</button>'
            + '</div>';
          addMessage('answer', html);
        }
      } catch (err) {
        addMessage('error', '<div class="label">Error</div>' + escapeHtml(err.message));
      }
      btnUpload.disabled = false;
      btnUpload.textContent = 'Upload Doc';
    }

    // Incrementally ingest a single already-uploaded file (does not touch others).
    async function ingestFile(btn, encodedName) {
      const filename = decodeURIComponent(encodedName);
      btn.disabled = true;
      btn.textContent = 'Ingesting…';
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'dot loading';
      text.textContent = 'Ingesting ' + filename + '…';
      try {
        const resp = await fetch('/api/ingest_file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename }),
        });
        const data = await resp.json();
        if (data.error) {
          addMessage('error', '<div class="label">Ingest Error</div>' + escapeHtml(data.error));
        } else {
          const replaced = data.replaced ? ' (replaced ' + data.replaced + ' old chunk' + (data.replaced === 1 ? '' : 's') + ')' : '';
          addMessage('answer', '<div class="label">Ingest</div>Ingested <strong>'
            + escapeHtml(data.source) + '</strong> — ' + data.chunks + ' chunks' + replaced + '.');
          btn.textContent = 'Ingested ✓';
        }
      } catch (err) {
        addMessage('error', '<div class="label">Error</div>' + escapeHtml(err.message));
        btn.disabled = false;
        btn.textContent = 'Ingest this file';
      }
      checkStatus();
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    checkStatus();
  </script>
</body>
</html>
